name: Update Currency Rates

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      SENTRY_CURRENCY_API_DSN: ${{ secrets.SENTRY_CURRENCY_API_DSN }}
      SHARED_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_DSN: ${{ secrets.SENTRY_CURRENCY_API_DSN != '' && secrets.SENTRY_CURRENCY_API_DSN || secrets.SENTRY_DSN }}
      SENTRY_ENVIRONMENT: production
      SENTRY_RELEASE: ${{ github.sha }}
      FX_WORKER_BASE_URL: ${{ vars.FX_WORKER_BASE_URL }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Warn on shared Sentry DSN fallback
        if: ${{ env.SENTRY_CURRENCY_API_DSN == '' && env.SHARED_SENTRY_DSN != '' }}
        run: echo "::warning::Using shared SENTRY_DSN fallback. Set SENTRY_CURRENCY_API_DSN to route cron events into the dedicated resplit-currency-api Sentry project."

      - name: Set date
        run: echo "date_today=$(date -uI)" >> "$GITHUB_ENV"

      - name: Start Sentry publish check-in
        id: sentry_checkin
        run: node scripts/sentry-checkin.js start >> "$GITHUB_OUTPUT"

      - name: Fetch and generate rates
        id: generate
        continue-on-error: true
        run: node currscript.js

      - name: Retry if failed
        if: ${{ steps.generate.outcome == 'failure' }}
        run: rm -rf package && node currscript.js

      - name: Validate generated artifacts
        run: node scripts/validate-package.js

      - name: Commit snapshot archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot-archive/
          git diff --staged --quiet || git commit -m "chore: archive daily snapshot ${{ env.date_today }}"
          git push

      - name: Validate deploy secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Sync FX Worker runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$SENTRY_DSN" ]; then
            printf "%s" "$SENTRY_DSN" | npx wrangler secret put SENTRY_DSN --config wrangler.jsonc
          else
            echo "::warning::Missing SENTRY_DSN for FX Worker. Worker errors will not reach Sentry."
          fi

          if [ -n "$SENTRY_RELEASE" ]; then
            printf "%s" "$SENTRY_RELEASE" | npx wrangler secret put SENTRY_RELEASE --config wrangler.jsonc
          fi

          if [ -n "$CRON_SECRET" ]; then
            printf "%s" "$CRON_SECRET" | npx wrangler secret put CRON_SECRET --config wrangler.jsonc
          else
            echo "::warning::Missing CRON_SECRET for FX Worker canary route."
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy_cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy --project-name=resplit-currency-api package
          npx wrangler pages deploy --project-name=resplit-currency-api --branch=latest package
          npx wrangler pages deploy --project-name=resplit-currency-api --branch=${{ env.date_today }} package

      - name: Report Cloudflare deploy failure to Sentry
        if: ${{ failure() && steps.deploy_cloudflare.outcome == 'failure' }}
        env:
          STEP_NAME: deploy_cloudflare
        run: node scripts/sentry-checkin.js issue cloudflare_deploy_failure "Cloudflare Pages deploy failed"

      - name: Deploy FX Worker
        id: deploy_fx_worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc

      - name: Report FX Worker deploy failure to Sentry
        if: ${{ failure() && steps.deploy_fx_worker.outcome == 'failure' }}
        env:
          STEP_NAME: deploy_fx_worker
        run: node scripts/sentry-checkin.js issue fx_worker_deploy_failure "Cloudflare Worker deploy failed"

      - name: Deploy to GitHub Pages
        id: deploy_github_pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$GITHUB_WORKSPACE/package"
          tmpdir="$(mktemp -d)"
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git init "$tmpdir"
          cd "$tmpdir"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          cp -R "$publish_dir"/. .
          touch .nojekyll
          git add --all
          git commit -m "deploy: publish GitHub Pages for ${GITHUB_SHA}"
          git remote add origin "$remote"
          git push --force origin gh-pages

      - name: Report GitHub Pages deploy failure to Sentry
        if: ${{ failure() && steps.deploy_github_pages.outcome == 'failure' }}
        env:
          STEP_NAME: deploy_github_pages
        run: node scripts/sentry-checkin.js issue github_pages_deploy_failure "GitHub Pages deploy failed"

      - name: Smoke check deployed endpoints
        id: smoke_check
        env:
          EXPECTED_DATE: ${{ env.date_today }}
          FX_WORKER_BASE_URL: ${{ env.FX_WORKER_BASE_URL }}
        run: node scripts/smoke-check-deploy.js

      - name: Finish Sentry publish check-in
        if: ${{ always() }}
        env:
          CHECKIN_ID: ${{ steps.sentry_checkin.outputs.checkin_id }}
          CHECKIN_STARTED_AT: ${{ steps.sentry_checkin.outputs.checkin_started_at }}
          JOB_STATUS: ${{ job.status }}
        run: node scripts/sentry-checkin.js finish
