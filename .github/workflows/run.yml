name: Update Currency Rates

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      SENTRY_CURRENCY_API_DSN: ${{ secrets.SENTRY_CURRENCY_API_DSN }}
      SHARED_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_DSN: ${{ secrets.SENTRY_CURRENCY_API_DSN != '' && secrets.SENTRY_CURRENCY_API_DSN || secrets.SENTRY_DSN }}
      SENTRY_ENVIRONMENT: production
      SENTRY_RELEASE: ${{ github.sha }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Warn on shared Sentry DSN fallback
        if: ${{ env.SENTRY_CURRENCY_API_DSN == '' && env.SHARED_SENTRY_DSN != '' }}
        run: echo "::warning::Using shared SENTRY_DSN fallback. Set SENTRY_CURRENCY_API_DSN to route cron events into the dedicated resplit-currency-api Sentry project."

      - name: Set date
        run: echo "date_today=$(date -uI)" >> "$GITHUB_ENV"

      - name: Start Sentry publish check-in
        id: sentry_checkin
        run: node scripts/sentry-checkin.js start >> "$GITHUB_OUTPUT"

      - name: Fetch and generate rates
        id: generate
        continue-on-error: true
        env:
          PUBLISH_DATE: ${{ env.date_today }}
        run: node currscript.js

      - name: Retry if failed
        if: ${{ steps.generate.outcome == 'failure' }}
        env:
          PUBLISH_DATE: ${{ env.date_today }}
        run: rm -rf package && node currscript.js

      - name: Validate generated artifacts
        run: node scripts/validate-package.js

      - name: Commit snapshot archive
        id: commit_snapshot_archive
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot-archive/
          if git diff --staged --quiet; then
            echo "archive_changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: archive daily snapshot ${{ env.date_today }}"
            echo "archive_changed=true" >> "$GITHUB_OUTPUT"
          fi

          if git push; then
            echo "stale_run=false" >> "$GITHUB_OUTPUT"
            echo "continue_stale_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch_name="${GITHUB_REF_NAME:-main}"
          git fetch origin "$branch_name"

          remote_snapshot="$(mktemp)"
          if git show "origin/${branch_name}:snapshot-archive/${{ env.date_today }}.json" > "$remote_snapshot" 2>/dev/null \
            && cmp -s "$remote_snapshot" "snapshot-archive/${{ env.date_today }}.json"; then
            deploy_drift="$(git diff --name-only HEAD..origin/${branch_name} -- .github/workflows/run.yml country.json currscript.js package.json package-lock.json scripts skeleton-package.json worker wrangler.jsonc snapshot-archive || true)"
            if [ -z "$deploy_drift" ]; then
              echo "::notice::Remote ${branch_name} already has snapshot-archive/${{ env.date_today }}.json from a newer run, and deploy inputs still match. Continuing deploy steps with the validated local artifact output."
              echo "continue_stale_deploy=true" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::Remote ${branch_name} already has snapshot-archive/${{ env.date_today }}.json from a newer run, but deploy inputs drifted on trunk. Skipping deploy steps for this stale dispatch."
              printf 'stale_deploy_drift<<EOF\n%s\nEOF\n' "$deploy_drift" >> "$GITHUB_OUTPUT"
              echo "continue_stale_deploy=false" >> "$GITHUB_OUTPUT"
            fi
            echo "stale_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "stale_run=false" >> "$GITHUB_OUTPUT"
          echo "continue_stale_deploy=false" >> "$GITHUB_OUTPUT"
          echo "::error::Snapshot push failed and remote snapshot does not match local output."
          exit 1

      - name: Validate deploy secrets
        if: ${{ steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Sync FX Worker runtime secrets
        if: ${{ steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$SENTRY_DSN" ]; then
            printf "%s" "$SENTRY_DSN" | npx wrangler secret put SENTRY_DSN --config wrangler.jsonc
          else
            echo "::warning::Missing SENTRY_DSN for FX Worker. Worker errors will not reach Sentry."
          fi

          if [ -n "$SENTRY_RELEASE" ]; then
            printf "%s" "$SENTRY_RELEASE" | npx wrangler secret put SENTRY_RELEASE --config wrangler.jsonc
          fi

          if [ -n "$CRON_SECRET" ]; then
            printf "%s" "$CRON_SECRET" | npx wrangler secret put CRON_SECRET --config wrangler.jsonc
          else
            echo "::warning::Missing CRON_SECRET for FX Worker canary route."
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy_cloudflare
        if: ${{ steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy --project-name=resplit-currency-api package
          npx wrangler pages deploy --project-name=resplit-currency-api --branch=latest package
          npx wrangler pages deploy --project-name=resplit-currency-api --branch=${{ env.date_today }} package

      - name: Report Cloudflare deploy failure to Sentry
        if: ${{ failure() && (steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true') && steps.deploy_cloudflare.outcome == 'failure' }}
        env:
          STEP_NAME: deploy_cloudflare
        run: node scripts/sentry-checkin.js issue cloudflare_deploy_failure "Cloudflare Pages deploy failed"

      - name: Deploy FX Worker
        id: deploy_fx_worker
        if: ${{ steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc

      - name: Report FX Worker deploy failure to Sentry
        if: ${{ failure() && (steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true') && steps.deploy_fx_worker.outcome == 'failure' }}
        env:
          STEP_NAME: deploy_fx_worker
        run: node scripts/sentry-checkin.js issue fx_worker_deploy_failure "Cloudflare Worker deploy failed"

      - name: Deploy to GitHub Pages
        id: deploy_github_pages
        if: ${{ steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$GITHUB_WORKSPACE/package"
          tmpdir="$(mktemp -d)"
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git init --initial-branch=gh-pages "$tmpdir"
          cd "$tmpdir"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -R "$publish_dir"/. .
          touch .nojekyll
          git add --all
          git commit -m "deploy: publish GitHub Pages for ${GITHUB_SHA}"
          git remote add origin "$remote"
          git push --force origin gh-pages

      - name: Report GitHub Pages deploy failure to Sentry
        if: ${{ failure() && (steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true') && steps.deploy_github_pages.outcome == 'failure' }}
        env:
          STEP_NAME: deploy_github_pages
        run: node scripts/sentry-checkin.js issue github_pages_deploy_failure "GitHub Pages deploy failed"

      - name: Smoke check deployed endpoints
        id: smoke_check
        if: ${{ steps.commit_snapshot_archive.outputs.stale_run != 'true' || steps.commit_snapshot_archive.outputs.continue_stale_deploy == 'true' }}
        env:
          EXPECTED_DATE: ${{ env.date_today }}
        run: node scripts/smoke-check-deploy.js

      - name: Finish Sentry publish check-in
        if: ${{ always() }}
        env:
          CHECKIN_ID: ${{ steps.sentry_checkin.outputs.checkin_id }}
          CHECKIN_STARTED_AT: ${{ steps.sentry_checkin.outputs.checkin_started_at }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -n "$CHECKIN_ID" ]; then
            node scripts/sentry-checkin.js finish
          else
            echo "::notice::Skipping Sentry publish check-in finish because the start step did not produce a check-in id."
          fi
