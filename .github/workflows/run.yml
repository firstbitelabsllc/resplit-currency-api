name: Update Currency Rates

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and generate rates
        id: generate
        continue-on-error: true
        run: node currscript.js

      - name: Retry if failed
        if: ${{ steps.generate.outcome == 'failure' }}
        run: node currscript.js

      - name: Set date
        run: |
          echo "date_today=$(date -uI)" >> "$GITHUB_ENV"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            pages deploy --project-name=resplit-currency-api package
            pages deploy --project-name=resplit-currency-api --branch=latest package
            pages deploy --project-name=resplit-currency-api --branch=${{ env.date_today }} package

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./package
