name: Update Currency Rates

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and generate rates
        id: generate
        continue-on-error: true
        run: node currscript.js

      - name: Retry if failed
        if: ${{ steps.generate.outcome == 'failure' }}
        run: rm -rf package && node currscript.js

      - name: Set date
        run: |
          echo "date_today=$(date -uI)" >> "$GITHUB_ENV"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            pages deploy --project-name=resplit-currency-api package
            pages deploy --project-name=resplit-currency-api --branch=latest package
            pages deploy --project-name=resplit-currency-api --branch=${{ env.date_today }} package

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./package
