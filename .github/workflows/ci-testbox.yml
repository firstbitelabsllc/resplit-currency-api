name: Blacksmith Testbox
on:
  workflow_dispatch:
    inputs:
      testbox_id:
        type: string
        description: "Testbox session ID"
        required: true
  pull_request:
    paths:
      - '.github/workflows/**'

jobs:
  local-ci-pointer:
    name: Local CI pointer
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Begin Testbox
        uses: useblacksmith/begin-testbox@v2
        with:
          testbox_id: ${{ inputs.testbox_id }}
      - name: Point to local proof
        run: |
          echo "GitHub Actions runbook is intentionally production/manual scoped in this repo."
          echo "Use local proof commands and docs before publishing."
          echo "Common proof commands here:"
          echo "  npm run test"
          echo "  npm run lint"
      - name: Run Testbox
        uses: useblacksmith/run-testbox@v2
        if: always()
