name: Deploy OCR Loki forwarder

on:
  workflow_dispatch:
    inputs:
      activate:
        description: Create resources and stage a no-traffic candidate; never enable the sink
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: resplit-fx-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && inputs.activate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      REPO: resplit-fx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push reviewed forwarder
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: infra/ocr-loki-forwarder/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/ocr-loki-forwarder:${{ github.sha }}
          cache-from: type=gha,scope=ocr-loki-forwarder
          cache-to: type=gha,scope=ocr-loki-forwarder,mode=max

      - name: Reconcile activation-gated topology
        env:
          ACTIVATE: '1'
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/ocr-loki-forwarder@${{ steps.build.outputs.digest }}
          PROJECT: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
        run: bootstrap/deploy-ocr-loki-forwarder.sh
