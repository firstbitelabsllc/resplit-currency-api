name: Deploy OCR Loki forwarder

on:
  workflow_dispatch:
    inputs:
      activate:
        description: Create the separately billed private export resources
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: resplit-fx-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && inputs.activate
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      REPO: resplit-fx
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push reviewed forwarder
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: infra/ocr-loki-forwarder/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/ocr-loki-forwarder:${{ github.sha }}
          cache-from: type=gha,scope=ocr-loki-forwarder
          cache-to: type=gha,scope=ocr-loki-forwarder,mode=max

      - name: Reconcile activation-gated topology
        env:
          ACTIVATE: '1'
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/ocr-loki-forwarder@${{ steps.build.outputs.digest }}
          PROJECT: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
        run: bootstrap/deploy-ocr-loki-forwarder.sh
